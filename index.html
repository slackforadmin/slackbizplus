<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>biz+ 조직관리화면</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  <style>
    :root {
      --theme-color: #005AAB; /* 포인트 컬러 */
    }
    /* 사이드바 글씨 크기와 간격 조정 */
    .sidebar-nav {
      line-height: 2em;
    }
    /* 본문이 너무 왼쪽으로 붙지 않게 조정 */
    .content {
      padding-top: 60px;
    }
  </style>
</head>
<body>
  <div id="app">로딩 중...</div>
  <script>
    window.$docsify = {
      name: 'biz+ 조직관리화면',
      loadSidebar: true, // 반드시 true여야 _sidebar.md를 읽어옵니다.
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md' // 하위 폴더에서도 사이드바 유지
      },
      subMaxLevel: 3,    // 본문의 H2, H3 제목을 사이드바에 자동으로 표시
      auto2top: true
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <style>
  :root {
    --theme-color: #7E57C2; /* 강조색도 보라색 계열로 맞추면 예쁩니다 */
  }

  /* 사이드바 배경색 변경 */
  .sidebar {
    background-color: #F3E5F5 !important; /* 연보라색 적용 */
    border-right: 1px solid #E1BEE7;    /* 구분선도 연한 보라색으로 */
  }

  /* 사이드바 내부 검색창 배경 (검색 플러그인 사용 시) */
  .sidebar .search input {
    background-color: #ffffff;
  }

  /* 선택된 메뉴의 배경색 살리기 */
  .sidebar-nav li.active > a {
    background-color: #ffffff;
    border-radius: 4px;
  }
</style>
</body>
</html>
