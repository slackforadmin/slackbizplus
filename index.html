<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Biz+ 조직관리화면</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

  <style>
      :root {
        --theme-color: #7E57C2;
      }

      /* 전체 폰트 통합 및 가독성 설정 */
      body {
        font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif !important;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
  
      /* 1. 사이드바 디자인 */
      .sidebar {
        background-color: #F3E5F5 !important;
        border-right: 1px solid #E1BEE7;
        padding-left: 25px !important;
        padding-right: 20px !important;
        box-sizing: border-box;
      }
  
      /* 2. 우측 본문 배경 */
      .main, section.content, article#main {
        background-color: #ffffff !important;
      }
  
      /* 3. 사이드바 상단 로고 및 제목 영역 */
      .sidebar > h1 {
        background-color: transparent !important;
        margin: 0;
        padding: 40px 0 20px 0 !important;
        font-weight: 700 !important;
        color: #333;
        text-align: center;
      }
  
      .sidebar-toggle {
        background-color: transparent !important;
      }
  
      /* 4. 기본 메뉴 텍스트 설정 */
      .sidebar-nav a {
        font-weight: 500 !important;
        font-size: 15px;
        color: #555 !important;
        text-decoration: none;
      }

      /* 굵은 텍스트(대메뉴 등) 스타일 */
      .sidebar-nav strong {
        font-weight: 700 !important;
        color: #333 !important;
      }

      /* [수정 포인트] 선택된 메뉴 스타일 (홈 및 모든 활성 메뉴 공통 적용) */
      /* li가 active 상태일 때 그 바로 아래의 a 혹은 strong이 포함된 a에 하얀 상자 부여 */
      .sidebar-nav li.active > a {
        background-color: #ffffff !important;
        border-radius: 10px;
        margin-left: -5px;
        padding-left: 15px !important;
        font-weight: 700 !important;
        color: var(--theme-color) !important;
        display: block; /* 영역 꽉 채우기 */
      }
  
      .sidebar-nav {
        line-height: 2.2em;
      }
  
      .content {
        padding-top: 60px;
        max-width: 900px;
      }

      /* 접기 아이콘 및 간격 설정 */
      .sidebar-nav .folder-before:before {
        color: #7E57C2 !important;
      }
      
      .sidebar-nav ul li ul {
        padding-left: 20px !important;
      }
  </style>
</head>
<body>
  <div id="app">로딩 중...</div>
  <script>
    window.$docsify = {
      name: 'Biz+ 조직관리화면',
      loadSidebar: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      sidebarDisplayLevel: 0,
      subMaxLevel: 3,
      auto2top: true,
      plugins: [
        function(hook) {
          hook.ready(function() {
            var header = document.querySelector('.sidebar > h1');
            var img = document.createElement('img');
            img.src = 'https://a.slack-edge.com/38f0e7c/marketing/img/nav/logo.svg';
            img.style.width = '50px';
            img.style.display = 'block';
            img.style.margin = '0 auto 15px auto';
            header.insertBefore(img, header.firstChild);
          });
        }
      ]
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
</body>
</html>
