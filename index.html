<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>나의 업무 위키</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  <style>
    :root {
      --theme-color: #005AAB; /* 포인트 컬러 */
    }
    /* 사이드바 글씨 크기와 간격 조정 */
    .sidebar-nav {
      line-height: 2em;
    }
    /* 본문이 너무 왼쪽으로 붙지 않게 조정 */
    .content {
      padding-top: 60px;
    }
  </style>
</head>
<body>
  <div id="app">로딩 중...</div>
  <script>
    window.$docsify = {
      name: '나의 위키',
      loadSidebar: true, // 반드시 true여야 _sidebar.md를 읽어옵니다.
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md' // 하위 폴더에서도 사이드바 유지
      },
      subMaxLevel: 3,    // 본문의 H2, H3 제목을 사이드바에 자동으로 표시
      auto2top: true
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <style>
  :root {
    /* 사이드바 강조색을 슬랙 파스텔 블루로 설정 */
    --theme-color: #A1DFFB; 
  }

  /* 사이드바 배경 및 글자색 설정 */
  .sidebar {
    background-color: #ffffff;
    border-right: 1px solid #f0f0f0;
  }

  /* 사이드바의 각 메뉴 항목(불렛)에 슬랙 4색 포인트 주기 */
  .sidebar-nav li > ul > li:nth-child(4n+1) { border-left: 4px solid #A1DFFB; padding-left: 10px; } /* 파스텔 블루 */
  .sidebar-nav li > ul > li:nth-child(4n+2) { border-left: 4px solid #B1E5D3; padding-left: 10px; } /* 파스텔 그린 */
  .sidebar-nav li > ul > li:nth-child(4n+3) { border-left: 4px solid #F9E4B7; padding-left: 10px; } /* 파스텔 옐로우 */
  .sidebar-nav li > ul > li:nth-child(4n+0) { border-left: 4px solid #F7C1D1; padding-left: 10px; } /* 파스텔 레드 */

  /* 마우스 올렸을 때 배경색 */
  .sidebar-nav li a:hover {
    background-color: #f9f9f9;
    color: var(--theme-color);
  }
</style>
</body>
</html>
