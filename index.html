<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>나의 업무 위키</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  
  <style>
    /* 2. 사이드바와 강조색을 더 깔끔하게 조정 */
    :root {
      --theme-color: #005AAB; /* 포인트 컬러 (LG 블루 느낌) */
    }
    
    /* 사이드바 배경을 아주 연한 회색으로 해서 본문과 구분감 주기 */
    .sidebar {
      background-color: #f8f9fa;
      border-right: 1px solid #e9ecef;
    }

    /* 본문 영역 넓게 쓰기 */
    .content {
      max-width: 1000px;
    }
  </style>
</head>
<body>
  <div id="app">로딩 중...</div>
  <script>
    window.$docsify = {
      name: '나의 위키',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
