<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>biz+ 조직관리화면</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  
  <style>
    :root {
      /* 강조색: 진한 보라색 */
      --theme-color: #7E57C2; 
    }

    /* 1. 사이드바 스타일 설정 */
    .sidebar {
      background-color: #F3E5F5 !important; /* 연보라색 배경 */
      border-right: 1px solid #E1BEE7;      /* 구분선 */
    }

    /* 2. 사이드바 내부 텍스트 및 간격 */
    .sidebar-nav {
      line-height: 2em;
      padding-left: 15px;
    }

    /* 3. 선택된 메뉴 강조 (하얀색 캡슐 형태) */
    .sidebar-nav li.active > a {
      background-color: #ffffff !important;
      border-radius: 8px 0 0 8px; /* 왼쪽만 둥글게 해서 책장 느낌 강조 */
      font-weight: bold;
    }

    /* 4. 본문 레이아웃 조정 */
    .content {
      padding-top: 60px;
      max-width: 900px;
    }

    /* 5. 검색창이 있을 경우의 스타일 */
    .sidebar .search input {
      background-color: #ffffff;
      border: 1px solid #E1BEE7;
    }
  </style>
</head>
<body>
  <div id="app">로딩 중...</div>
  <script>
    window.$docsify = {
      name: 'biz+ 조직관리화면',
      loadSidebar: true,     // _sidebar.md 사용 필수
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      subMaxLevel: 3,        // 문서 내 소제목 추출
      auto2top: true,        // 페이지 이동 시 상단 스크롤
      formatUpdated: '{YYYY}/{MM}/{DD} {HH}:{mm}' // 업데이트 날짜 표시 형식
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
