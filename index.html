<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Biz+ 조직관리화면</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
<style>
    :root {
      --theme-color: #7E57C2;
    }

    /* 1. 사이드바: 연보라색 유지 */
    .sidebar {
      background-color: #F3E5F5 !important;
      border-right: 1px solid #E1BEE7;
    }

    /* 2. 우측 본문: 완전한 하얀색으로 고정 */
    .main, section.content, article#main {
      background-color: #ffffff !important;
    }

    /* 3. 사이드바 상단 제목 투명화 (하얀 박스 제거) */
    .sidebar > h1 {
      background-color: transparent !important;
      margin: 0;
      padding: 20px 15px;
      font-weight: bold;
      color: #333;
      /*font-size: 1.2rem;*/
    }

    /* 4. 모바일 토글 버튼 배경 투명화 */
    .sidebar-toggle {
      background-color: transparent !important;
    }

    /* 5. 선택된 메뉴 스타일 */
    .sidebar-nav li.active > a {
      background-color: #ffffff !important;
      border-radius: 10px 0 0 10px;
      margin-left: 10px;
      font-weight: bold;
    }

    /* 6. 본문 너비 및 여백 */
    .content {
      padding-top: 60px;
      max-width: 900px;
    }
  </style>
</head>
<body>
  <div id="app">로딩 중...</div>
  <script>
    window.$docsify = {
      name: 'Biz+ 조직관리화면14',
      //loadSidebar: true, // 필수
      // 경로 문제를 방지하기 위해 alias를 더 단순화합니다.
    //  alias: {
    //    '/_sidebar.md': '/_sidebar.md'
    //  },
    //  subMaxLevel: 3,
    //  auto2top: true,
      plugins: [
      function(hook) {
        hook.beforeEach(function(html) {
          // 문서가 로드되기 전 사이드바 상단에 글자를 삽입하고 싶을 때 사용
          return html;
        });
        hook.ready(function() {
          // 사이드바 요소 안에 강제로 글자 박스를 집어넣음
          var sideEl = document.querySelector('.sidebar-nav');
          var div = document.createElement('div');
          div.className = 'custom-sidebar-text';
          div.innerHTML = '📌 공지: 조직관리 매뉴얼 업데이트 중';
          sideEl.insertBefore(div, sideEl.firstChild);
        });
      }
    ]
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
